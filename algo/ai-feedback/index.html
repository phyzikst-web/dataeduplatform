<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 코드 피드백 | AI DataEdu Platform</title>
    
    <!-- CodeMirror Core & Modes -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.12/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.12/theme/dracula.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.12/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.12/mode/python/python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.12/mode/javascript/javascript.min.js"></script>
    
    <!-- Marked.js & Highlight.js for Markdown -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <link rel="stylesheet" href="../../styles.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="dark-theme">
    <!-- Navbar -->
    <nav class="fb-navbar">
        <div class="nav-left">
            <a href="../index.html" class="back-btn" title="알고리즘 홈으로">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
            </a>
            <div class="nav-title">
                <h1>🤖 AI 코드 피드백</h1>
            </div>
        </div>
        
        <div class="nav-center">
            <div class="lang-toggle">
                <button class="lang-btn active" data-lang="python">Python 3</button>
                <button class="lang-btn" data-lang="javascript">JavaScript</button>
            </div>
        </div>

        <div class="nav-right">
            <button id="api-key-btn" class="icon-btn" title="API 키 설정">🔑</button>
            <a href="../../index.html" class="home-btn" title="메인 홈으로">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            </a>
        </div>
    </nav>

    <!-- Main Layout -->
    <main class="fb-layout">
        <!-- Left: Editor -->
        <div class="panel editor-panel">
            <div class="panel-header">
                <div class="tab">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></svg>
                    <span id="editor-filename">solution.py</span>
                </div>
            </div>
            <div id="editor-container" class="editor-container"></div>
            <div id="editor-scanner" class="editor-scanner" style="display: none;"></div>
        </div>

        <!-- Center: Action Button -->
        <div class="action-divider">
            <button id="feedback-btn" class="glow-btn">
                <span class="icon">🤖</span>
                <span class="text">AI 피드백 받기</span>
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="arrow"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
            </button>
        </div>

        <!-- Right: AI Result -->
        <div class="panel result-panel">
            <div class="panel-header">
                <span>분석 결과</span>
            </div>
            <div id="result-container" class="result-container">
                <!-- Initial State -->
                <div class="placeholder-state" id="state-empty">
                    <div class="icon">🔍</div>
                    <h3>코드를 분석할 준비가 되었습니다</h3>
                    <p>왼쪽 에디터에 코드를 작성하고 중앙의 '피드백 받기' 버튼을 클릭하세요.</p>
                </div>

                <!-- Loading State -->
                <div class="loading-state" id="state-loading" style="display: none;">
                    <div class="skeleton-bars">
                        <div class="bar h1"></div>
                        <div class="bar p1"></div>
                        <div class="bar p2"></div>
                        <div class="bar p3"></div>
                        <div class="bar h2 mt"></div>
                        <div class="bar code"></div>
                    </div>
                    <p class="loading-text">AI가 코드를 꼼꼼히 분석하고 있습니다...</p>
                </div>

                <!-- Error State -->
                <div class="error-state" id="state-error" style="display: none;">
                    <div class="icon">⚠️</div>
                    <h3>오류가 발생했습니다</h3>
                    <p id="error-message">요청을 처리하는 중 문제가 발생했습니다.</p>
                    <button id="retry-btn" class="outline-btn">다시 시도</button>
                </div>

                <!-- Result State (Markdown output) -->
                <div class="markdown-body" id="state-result" style="display: none;">
                    <!-- Rendered by marked.js -->
                </div>
            </div>
        </div>
    </main>

    <!-- Scripts -->
    <script src="../../shared/gemini.js"></script>
    <script src="../../shared/learning-tracker.js"></script>
    <script src="app.js"></script>
</body>
</html>
