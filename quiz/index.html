<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algo Quiz | 알고리즘 및 CS 기초 퀴즈</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <header>
            <div class="header-content">
                <h1>Algo Quiz</h1>
                <p>기초부터 탄탄하게, 자료구조와 알고리즘 이론을 점검하세요.</p>
            </div>
            <a href="../index.html" class="secondary-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                메인 홈
            </a>
        </header>

        <main id="quiz-container">
            <!-- 퀴즈 문항들이 여기에 동적으로 생성됩니다. -->
        </main>

        <div class="actions">
            <button id="submit-quiz" class="primary-btn">최종 제출 및 채점</button>
        </div>
    </div>

    <!-- 결과 확인 모달 -->
    <div id="result-modal" class="modal-overlay">
        <div class="modal-card">
            <h2>Quiz Results</h2>
            <div id="result-text" class="result-stats">
                0 / 0
            </div>
            <p style="color: var(--text-secondary); margin-bottom: 2rem;">수고하셨습니다! 당신의 학습 성취도입니다.</p>
            
            <div class="input-group" style="text-align: left; margin-bottom: 1.5rem;">
                <label style="font-size: 0.85rem; color: var(--text-secondary); margin-left: 0.5rem; margin-bottom: 0.5rem; display: block;">학생 이름 / 학번</label>
                <input type="text" id="student-name" placeholder="홍길동 (20240000)" class="text-input">
            </div>

            <div class="action-buttons">
                <button id="copy-result" class="primary-btn" style="width: 100%; padding: 1rem;">결과 텍스트 복사</button>
                <button id="close-modal" class="secondary-btn" style="width: 100%; justify-content: center; padding: 1rem;">다시 풀기</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
