<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI DataEdu Platform | 실전 퀴즈</title>
    <!-- CodeMirror & styles.css -->
    <link rel="stylesheet" href="../styles.css?v=20260525">
    <link rel="stylesheet" href="styles.css?v=20260525">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/styles/github.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/highlight.min.js"></script>
</head>
<body>
    <div class="app-container">
        <header>
            <div class="header-content">
                <a href="../index.html" class="back-link">← 홈으로 가기</a>
                <div style="display: flex; align-items: center; gap: 0.75rem;">
                    <span style="font-size: 2.2rem;">📝</span>
                    <div>
                        <h1 id="quiz-page-title">AI 실전 퀴즈</h1>
                        <p id="quiz-page-desc">기초 개념을 다지는 객관식 퀴즈를 풀어보세요.</p>
                    </div>
                </div>
            </div>
            <div class="header-actions">
                <a href="../index.html" class="secondary-btn" style="border-radius: 12px; font-size: 0.9rem;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                    메인 홈
                </a>
            </div>
        </header>

        <main id="quiz-container">
            <div class="card" style="text-align: center; padding: 3rem;">
                <div class="spinner" style="width: 35px; height: 35px; border: 3px dashed rgba(139,92,246,0.3); border-top-color: #8b5cf6; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 1.5rem;"></div>
                <p style="color: var(--text-muted);">AI 퀴즈 데이터를 원격/로컬 스토리지에서 분석하여 조립하는 중입니다...</p>
            </div>
        </main>

        <div class="actions" id="quiz-actions" style="display: none; margin-top: 2rem;">
            <button id="submit-quiz" class="primary-btn" style="padding: 1rem 3rem; font-size: 1.05rem; border-radius: 14px; background: var(--ai-gradient); cursor: pointer;">
                최종 제출 및 채점하기
            </button>
        </div>
    </div>

    <!-- 결과 확인 모달 -->
    <div id="result-modal" class="modal-overlay">
        <div class="modal-card" style="background: rgba(15, 23, 42, 0.95); border: 1px solid var(--glass-border); border-radius: 24px; padding: 2.5rem; max-width: 450px; width: 90%; text-align: center; backdrop-filter: blur(20px); box-shadow: var(--glass-shadow);">
            <div style="font-size: 3.5rem; margin-bottom: 1rem;">🏆</div>
            <h2 style="font-size: 1.8rem; color: #fff; margin-bottom: 0.5rem; font-family: 'Outfit', sans-serif;">Quiz Results</h2>
            <div id="result-text" class="result-stats" style="font-size: 2.5rem; font-weight: 800; margin: 1.5rem 0; background: var(--ai-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;">
                0 / 0
            </div>
            <p style="color: var(--text-muted); margin-bottom: 2rem; font-size: 0.95rem;">축하합니다! 퀴즈 학습 성취 기록이 대시보드에 자동으로 저장되었습니다.</p>
            
            <div class="form-group" style="text-align: left; margin-bottom: 1.5rem;">
                <label style="font-size: 0.85rem; color: var(--text-muted); margin-bottom: 0.5rem; display: block; font-weight: 600;">학생 이름 / 학번</label>
                <input type="text" id="student-name" placeholder="홍길동 (20260000)" class="form-control" style="background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); border-radius: 10px; color: #fff; padding: 0.75rem 1rem;">
            </div>

            <div style="display: flex; gap: 1rem;">
                <button id="copy-result" class="primary-btn" style="flex: 1; padding: 0.75rem; font-size: 0.9rem; border-radius: 10px; background: var(--ai-gradient); cursor: pointer;">결과 복사</button>
                <button id="close-modal" class="secondary-btn" style="flex: 1; padding: 0.75rem; font-size: 0.9rem; border-radius: 10px; justify-content: center; cursor: pointer;">다시 풀기</button>
            </div>
        </div>
    </div>

    <!-- 로컬 트래커 및 앱 로직 -->
    <script src="../shared/learning-tracker.js"></script>
    <script src="app.js?v=20260525"></script>
</body>
</html>
