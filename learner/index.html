<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algo Learner | AI 기반 알고리즘 개념 학습</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="notebooks.js" defer></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <header>
            <div style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
                <div style="text-align: left;">
                    <h1>Algo Learner</h1>
                    <p>다양한 시각적 학습 모드로 알고리즘의 심연을 탐험하세요.</p>
                </div>
                <a href="../index.html" class="secondary-btn" style="text-decoration: none; border-radius: 12px; padding: 0.6rem 1.25rem; font-size: 0.9rem;">
                    🏠 메인 홈
                </a>
            </div>
        </header>

        <main>
            <!-- Setup View (Teacher/Input) -->
            <section id="setup-view" class="view active">
                <div class="card">
                    <h2>학습 환경 설정</h2>
                    
                    <div class="input-group">
                        <label for="notebook-select" style="display: block; font-weight: 600; margin-bottom: 0.5rem; color: var(--accent); font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.05em;">강의 실습 불러오기</label>
                        <div class="select-wrapper">
                            <select id="notebook-select">
                                <option value="" disabled selected>실습 주피터 노트북을 선택해 주세요</option>
                            </select>
                        </div>
                    </div>
                    
                    <button id="generate-btn" class="primary-btn" style="margin-top: 1.5rem;">학습 시작하기</button>
                </div>
            </section>

            <!-- Practice View (Student/Learning) -->
            <section id="practice-view" class="view">
                <div class="card practice-card" id="capture-area">
                    <div class="certificate-info">
                        <h2 style="color: var(--success); margin-bottom: 0.5rem; font-family: 'Outfit', sans-serif;">CONGRATULATIONS</h2>
                        <p style="color: var(--text-secondary);">이름: <span id="cert-name" style="color: #fff; font-weight: 600;"></span></p>
                    </div>

                    <div class="practice-header">
                        <div>
                            <h2 id="stage-title">Stage 0: 타이핑 연습</h2>
                            <p id="stage-desc" style="color: var(--text-secondary); margin-top: 0.25rem;">원본 코드를 보며 정확히 따라 타이핑하세요.</p>
                        </div>
                        <button id="back-btn" class="icon-btn" title="다시 설정하기">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 6px;"><path d="m15 18-6-6 6-6"/></svg>
                            중단하기
                        </button>
                    </div>

                    <!-- Progress Bar -->
                    <div class="progress-container" style="margin-bottom: 2rem;">
                        <div class="progress-bar-bg" style="width: 100%; height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden;">
                            <div id="progress-bar-fill" style="width: 0%; height: 100%; background: var(--accent); transition: width 0.3s ease;"></div>
                        </div>
                        <div style="display: flex; justify-content: space-between; margin-top: 0.5rem; font-size: 0.8rem; color: var(--text-secondary);">
                            <span id="progress-text">진행률: 0%</span>
                            <span id="repeat-text" style="color: var(--success); font-weight: bold; display: none;">반복: 0/3</span>
                        </div>
                    </div>
                    
                    <!-- Dynamic Work Area -->
                    <div id="dynamic-work-area" style="display: flex; flex-direction: column; gap: 1rem;">
                        <!-- Code container is injected here by JS -->
                    </div>
                    
                    <div class="action-buttons" style="margin-top: 2rem; display: flex; gap: 1rem;">
                        <button id="skip-btn" class="secondary-btn" style="flex: 1;">다음 단계로 건너뛰기 ⏭️</button>
                        <button id="check-btn" class="success-btn" style="flex: 2;">정답 제출 / 다음 단계</button>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Result Modal -->
    <div id="result-modal" class="modal-overlay">
        <div class="modal-card">
            <h2>🎉 Excellent!</h2>
            <p style="color: var(--text-secondary); font-size: 1.1rem;">모든 로직을 완벽하게 이해하셨습니다.</p>
            <div class="result-stats">
                <div>정답률 <span class="highlight">100%</span></div>
            </div>
            
            <div class="input-group" style="margin-top: 2rem; text-align: left;">
                <label for="student-name" style="font-size: 0.9rem; color: var(--text-secondary); margin-left: 0.5rem;">학생 성명 / 학번</label>
                <input type="text" id="student-name" placeholder="홍길동 (20240000)" class="text-input">
            </div>

            <div class="action-buttons" style="margin-top: 2.5rem;">
                <button id="copy-result-btn" class="secondary-btn" style="flex: 1.2;">텍스트 복사</button>
                <button id="download-img-btn" class="primary-btn">인증서 다운로드</button>
            </div>
            <button id="close-modal-btn" class="icon-btn close-modal" style="top: 2rem; right: 2rem;">&times;</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
