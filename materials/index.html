<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algo Materials | 강의 자료 및 슬라이드</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">Algo Materials</div>
        <div class="nav-controls">
            <a href="../index.html" class="nav-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                메인 홈
            </a>
        </div>
    </nav>

    <div class="layout">
        <!-- Sidebar: Material List -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>강의 커리큘럼</h2>
            </div>
            <ul class="material-list" id="material-list">
                <!-- Materials injected here -->
            </ul>
        </aside>

        <!-- Main Content: PDF Viewer -->
        <main class="viewer-area" id="viewer-container">
            <div class="placeholder" id="viewer-placeholder">
                <h3>Select a Material</h3>
                <p>학습할 강의 자료를 왼쪽 리스트에서 선택해 주세요. PDF 파일을 슬라이드 모드로 바로 보실 수 있습니다.</p>
            </div>
            <canvas id="pdf-canvas" style="display: none; max-width: 95%; max-height: 95%; box-shadow: 0 0 50px rgba(0,0,0,0.5);"></canvas>
            
            <!-- Viewer Controls (Hidden by default, shown when PDF loaded) -->
            <div id="viewer-controls" style="display: none; position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); padding: 0.8rem 1.5rem; border-radius: 40px; display: flex; align-items: center; gap: 1.5rem; border: 1px solid rgba(255,255,255,0.1); z-index: 100;">
                <button id="prev-page" class="nav-btn" style="padding: 0.4rem 0.8rem;">◀ 이전</button>
                <div id="page-info" style="font-size: 0.9rem; font-weight: 600; min-width: 80px; text-align: center;">
                    Page <span id="current-page">0</span> / <span id="total-pages">0</span>
                </div>
                <button id="next-page" class="nav-btn" style="padding: 0.4rem 0.8rem;">다음 ▶</button>
                <button id="fullscreen-btn" class="nav-btn" title="전체화면" style="padding: 0.4rem;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
                </button>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
