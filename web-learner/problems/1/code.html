<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>개인 포트폴리오</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Arial', sans-serif; line-height: 1.6; background-color: #f9f9f9; color: #333; }
        header { background: #222; color: #fff; padding: 20px;
                 display: flex; justify-content: space-between; align-items: center; }
        header ul { display: flex; list-style: none; gap: 20px; }
        header a  { color: #fff; text-decoration: none; }
        .profile-section { display: flex; max-width: 1000px; margin: 40px auto;
                           padding: 20px; background: #fff; border-radius: 8px;
                           gap: 40px; align-items: center; }
        .avatar { width: 200px; height: 200px; background: #ccc; border-radius: 50%;
                  display: flex; align-items: center; justify-content: center;
                  font-weight: bold; font-size: 1.2rem; }
        .info { flex: 1; }
        .projects { max-width: 1000px; margin: 40px auto; padding: 0 20px; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr);
                gap: 20px; margin-top: 20px; }
        .card { background: #fff; padding: 20px; border-radius: 8px;
                border: 1px solid #ddd; text-align: center; }
        @media screen and (max-width: 768px) {
            header { flex-direction: column; gap: 15px; text-align: center; }
            header ul { flex-direction: column; gap: 10px; }
            .profile-section { flex-direction: column; text-align: center; margin: 20px; }
            .grid { grid-template-columns: 1fr; }
            .projects { margin: 20px auto; }
        }
    </style>
</head>
<body>
    <header>
        <h2>My Portfolio</h2>
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Projects</a></li>
        </ul>
    </header>
    <section class="profile-section">
        <div class="avatar">프로필 사진</div>
        <div class="info">
            <h1>안녕하세요, 홍길동입니다.</h1>
            <p>프론트엔드 개발자를 목표로 공부하고 있는 학생입니다.</p>
        </div>
    </section>
    <section class="projects">
        <h2>My Projects</h2>
        <div class="grid">
            <div class="card"><h3>프로젝트 1</h3><p>설명이 들어갑니다.</p></div>
            <div class="card"><h3>프로젝트 2</h3><p>설명이 들어갑니다.</p></div>
            <div class="card"><h3>프로젝트 3</h3><p>설명이 들어갑니다.</p></div>
        </div>
    </section>
</body>
</html>
