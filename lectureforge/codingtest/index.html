<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Lecture Builder - 코딩테스트 문제 생성</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- CSS -->
    <link rel="stylesheet" href="../css/styles.css">
    <!-- highlight.js theme -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <style>
        .header-nav { margin-left: 2rem; display: flex; gap: 1rem; align-items: center; }
        .nav-link { text-decoration: none; color: #6B7280; font-size: 0.95rem; padding: 0.5rem 1rem; border-radius: 8px; transition: all 0.2s; }
        .nav-link:hover { background: #F3F4F6; color: #111827; }
        .nav-link.active { font-weight: 600; color: #4F46E5; background: #EEF2FF; }

        .ct-problem {
            border: 1px solid #E5E7EB;
            border-radius: 8px;
            margin-bottom: 2rem;
            padding: 2rem;
            background: #fff;
        }
        .ct-problem h3 {
            margin-top: 0;
            color: #111827;
            font-size: 1.5rem;
            border-bottom: 2px solid #E5E7EB;
            padding-bottom: 0.5rem;
        }
        .ct-section {
            margin-top: 1.5rem;
        }
        .ct-section h4 {
            font-size: 1.1rem;
            color: #374151;
            margin-bottom: 0.5rem;
            border-bottom: 1px dashed #E5E7EB;
            display: inline-block;
        }
        .ct-pre {
            background: #F9FAFB;
            border: 1px solid #E5E7EB;
            border-radius: 6px;
            padding: 1rem;
            font-family: 'Consolas', monospace;
            overflow-x: auto;
        }
        .ct-io-container {
            display: flex;
            gap: 1rem;
        }
        .ct-io-box {
            flex: 1;
        }
        .ct-solution {
            margin-top: 2rem;
            padding-top: 1rem;
            border-top: 2px dashed #E5E7EB;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="app-header">
        <div class="logo">
            <span class="icon">✨</span>
            <h1>AI Lecture Builder</h1>
            <nav class="header-nav">
                <a href="../index.html" class="nav-link">강의 슬라이드 생성</a>
                <a href="../notebook/index.html" class="nav-link">실습 Notebook 생성</a>
                <a href="../quiz/index.html" class="nav-link">객관식 문제 생성</a>
                <a href="index.html" class="nav-link active">코딩테스트 생성</a>
            </nav>
        </div>
    </header>

    <main class="app-container">
        <!-- Sidebar: Form -->
        <aside class="sidebar">
            <section class="form-section">
                <h2>코딩테스트 생성 설정</h2>
                <form id="codingTestForm">
                    <div class="form-group">
                        <label for="subject">과목명 / 주제 *</label>
                        <input type="text" id="subject" placeholder="예: 그리디 알고리즘" required>
                    </div>
                    <div class="form-group">
                        <label for="difficulty">난이도 *</label>
                        <select id="difficulty" required>
                            <option value="초급 (문법 적용, 백준 브론즈 수준)">초급 (문법 적용 수준)</option>
                            <option value="중급 (알고리즘 응용, 백준 실버 수준)" selected>중급 (알고리즘 응용 수준)</option>
                            <option value="고급 (심화 알고리즘, 백준 골드 수준)">고급 (심화 알고리즘 수준)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="problemCount">문제 수 *</label>
                        <input type="number" id="problemCount" value="3" min="1" max="10" required>
                    </div>
                    <div class="form-group">
                        <label for="pptFile">PPT 파일 업로드 (.pptx) *</label>
                        <input type="file" id="pptFile" accept=".pptx" required style="padding: 0.5rem; background: #fff; border: 1px solid #E5E7EB; border-radius: 6px; width: 100%; box-sizing: border-box;">
                        <small style="color: #6B7280; display: block; margin-top: 4px;">PPT 파일의 개념을 코딩테스트 문제로 변환합니다.</small>
                    </div>
                    
                    <button type="submit" id="btnGenerate" class="btn btn-primary btn-block">
                        <span class="btn-text">✨ 코딩테스트 생성 (Gemini)</span>
                        <span class="spinner hidden" id="loadingSpinner"></span>
                    </button>
                </form>
            </section>
        </aside>

        <!-- Main Area: Preview & Edit -->
        <section class="preview-area">
            <div class="preview-header">
                <div class="tabs">
                    <button class="tab active">코딩테스트 문제 미리보기</button>
                </div>
                <div class="export-actions">
                    <button id="btnExportMarkdown" class="btn btn-primary btn-sm" disabled>Markdown 다운로드</button>
                </div>
            </div>

            <!-- Preview View Container -->
            <div class="view-container active">
                <div id="ctPreviewRender" style="padding: 1.5rem; min-height: 400px;">
                    <div class="empty-state" style="text-align: center; color: #6B7280; margin-top: 4rem;">
                        <p>좌측 패널에서 PPT를 업로드하고<br>문제를 생성해주세요.</p>
                    </div>
                </div>
            </div>
            
            <div id="loadingOverlay" class="loading-overlay hidden">
                <div class="loading-content">
                    <div class="spinner-large"></div>
                    <p>AI가 코딩테스트 문제를 출제 중입니다... (약 1~2분 소요)</p>
                </div>
            </div>
        </section>
    </main>

    <!-- External Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/gitbrent/pptxgenjs@3.12.0/libs/jszip.min.js"></script>
    
    <!-- Application Scripts -->
    <script src="js/app.js"></script>
</body>
</html>
