<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LectureForge - 실습 Notebook 생성기</title>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <style>
        .header-nav { margin-left: 2rem; display: flex; gap: 1rem; align-items: center; }
        .header-nav a { text-decoration: none; color: #6B7280; font-size: 0.95rem; padding: 0.5rem 1rem; border-radius: 8px; transition: all 0.2s; }
        .header-nav a:hover { background: #F3F4F6; color: #111827; }
        .header-nav a.active { font-weight: 600; color: #4F46E5; background: #EEF2FF; }
        
        .cell-preview { border: 1px solid #E5E7EB; border-radius: 6px; margin-bottom: 1rem; overflow: hidden; }
        .cell-header { padding: 0.5rem 1rem; font-size: 0.8rem; font-weight: 600; color: #6B7280; background: #F9FAFB; border-bottom: 1px solid #E5E7EB; display: flex; justify-content: space-between; }
        .cell-body { padding: 1rem; }
        .cell-type-markdown .cell-header { border-left: 4px solid #3B82F6; }
        .cell-type-code .cell-header { border-left: 4px solid #10B981; }
        .cell-type-code .cell-body { background: #1E1E1E; color: #D4D4D4; font-family: 'Consolas', monospace; white-space: pre-wrap; font-size: 0.9rem; }
    </style>
</head>
<body>
    <header class="app-header">
        <div class="logo">
            <span class="icon">✨</span>
            <h1>LectureForge</h1>
            <nav class="header-nav">
                <a href="../index.html">강의 슬라이드 생성</a>
                <a href="index.html" class="active">실습 Notebook 생성</a>
                <a href="../quiz/index.html">객관식 문제 생성</a>
                <a href="../codingtest/index.html">코딩테스트 생성</a>
            </nav>
        </div>
    </header>

    <main class="app-container">
        <!-- Sidebar: Form -->
        <aside class="sidebar">
            <section class="form-section">
                <h2>실습 정보 입력</h2>
                <form id="notebookForm">
                    <div class="form-group">
                        <label for="subject">과목명 *</label>
                        <input type="text" id="subject" placeholder="예: 자료구조, 파이썬 기초" required>
                    </div>
                    <div class="form-group">
                        <label for="week">주차 (선택사항)</label>
                        <input type="text" id="week" placeholder="예: 5주차" required>
                    </div>
                    <div class="form-group">
                        <label for="problemCount">실습 예제/문제 개수 *</label>
                        <input type="number" id="problemCount" value="6" min="1" max="20" required>
                    </div>
                    <div class="form-group">
                        <label for="pptFile">PPT 파일 업로드 (.pptx) *</label>
                        <input type="file" id="pptFile" accept=".pptx" required style="padding: 0.5rem; background: #fff; border: 1px solid #E5E7EB; border-radius: 6px; width: 100%; box-sizing: border-box;">
                        <small style="color: #6B7280; display: block; margin-top: 4px;">강의용 PPT 파일을 업로드하면 텍스트를 자동 분석합니다.</small>
                    </div>
                    
                    <button type="submit" id="btnGenerate" class="btn btn-primary btn-block">
                        <span class="btn-text">✨ Notebook 생성 (Gemini)</span>
                        <span class="spinner hidden" id="loadingSpinner"></span>
                    </button>
                </form>
            </section>
        </aside>

        <!-- Main Area: Preview & Edit -->
        <section class="preview-area">
            <div class="preview-header">
                <div class="tabs">
                    <button class="tab active">Jupyter 셀 미리보기</button>
                </div>
                <div class="export-actions">
                    <button id="btnExportIpynb" class="btn btn-primary btn-sm" disabled>Notebook (.ipynb) 다운로드</button>
                </div>
            </div>

            <!-- Preview View Container -->
            <div class="view-container active">
                <div id="cellPreviewRender" class="markdown-body" style="padding: 1.5rem; background: #fff; border-radius: 8px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); min-height: 400px;">
                    <div class="empty-state" style="text-align: center; color: #6B7280; margin-top: 4rem;">
                        <p>좌측 패널에서 PPT 내용을 입력하고<br>Notebook을 생성해주세요.</p>
                    </div>
                </div>
            </div>
            
            <div id="loadingOverlay" class="loading-overlay hidden">
                <div class="loading-content">
                    <div class="spinner-large"></div>
                    <p>AI가 PPT 내용을 분석하여 Notebook을 생성 중입니다... (약 1분 소요)</p>
                </div>
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/gitbrent/pptxgenjs@3.12.0/libs/jszip.min.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
