<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algo Judge | 실전 코딩 테스트 환경</title>
    <!-- CodeMirror for Editor -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.12/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.12/theme/dracula.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.12/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.12/mode/python/python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.12/mode/javascript/javascript.min.js"></script>
    <!-- Split.js for layout -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/split.js/1.6.5/split.min.js"></script>
    <!-- Pyodide for Python Execution -->
    <script src="https://cdn.jsdelivr.net/pyodide/v0.23.2/full/pyodide.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">Algo Judge</div>
        <div class="nav-controls">
            <select id="problem-select">
                <option value="" disabled selected>문제를 선택하세요</option>
            </select>
            <a href="../index.html" class="secondary-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                메인 홈
            </a>
        </div>
    </nav>

    <div class="main-container">
        <!-- Left Panel: Problem Description -->
        <div id="problem-panel" class="panel">
            <div class="panel-header">Problem Description</div>
            <div class="content-scroll problem-desc" id="problem-content">
                <p style="color: var(--text-secondary);">상단 메뉴에서 문제를 선택하여 시작하세요.</p>
            </div>
        </div>

        <!-- Right Panel: Editor and Terminal -->
        <div id="right-panel">
            <div id="editor-panel" class="panel">
                <div class="panel-header" style="justify-content: space-between;">
                    <span>Solution Editor</span>
                    <div style="display: flex; gap: 0.5rem; align-items: center;">
                        <span id="lang-indicator" style="font-size: 0.75rem; color: var(--accent); background: rgba(56, 189, 248, 0.1); padding: 2px 6px; border-radius: 4px;">PYTHON</span>
                        <button id="run-btn" class="primary-btn" disabled>코드 실행 (Ctrl+Enter)</button>
                    </div>
                </div>
                <div id="editor-container">
                    <!-- CodeMirror will be initialized here -->
                </div>
            </div>

            <div id="terminal-panel" class="panel">
                <div class="panel-header" style="justify-content: space-between;">
                    <span>Execution Result</span>
                    <button id="clear-terminal" class="icon-btn" title="결과창 지우기">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
                    </button>
                </div>
                <div class="terminal content-scroll" id="terminal-output">
                    <div class="term-line term-info">준비 완료. 문제를 선택하고 코드를 작성해 보세요.</div>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
