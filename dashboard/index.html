<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나의 학습 현황 | AI DataEdu Platform</title>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container dashboard-container">
        <header class="dashboard-header">
            <a href="../index.html" class="back-link">← 메인으로 돌아가기</a>
            <h1>📊 나의 학습 <span>현황</span></h1>
            <p>지금까지의 학습 활동을 한눈에 확인하세요</p>
        </header>

        <!-- Stats Cards Row -->
        <div class="stats-row">
            <div class="stat-card stat-total">
                <div class="stat-icon">📚</div>
                <div class="stat-info">
                    <h3>총 학습 활동</h3>
                    <div class="stat-value" id="stat-total-activities">0</div>
                    <p class="stat-desc">플랫폼 내 전체 활동 횟수</p>
                </div>
            </div>
            
            <div class="stat-card stat-quiz">
                <div class="stat-icon">📝</div>
                <div class="stat-info">
                    <h3>퀴즈 평균 점수</h3>
                    <div class="stat-value" id="stat-quiz-score">0<span class="unit">%</span></div>
                    <p class="stat-desc">최근 제출한 퀴즈 기준</p>
                </div>
            </div>

            <div class="stat-card stat-ai">
                <div class="stat-icon">🤖</div>
                <div class="stat-info">
                    <h3>AI 활용 횟수</h3>
                    <div class="stat-value" id="stat-ai-usage">0</div>
                    <p class="stat-desc">AI 피드백 및 질문응답 횟수</p>
                </div>
            </div>
        </div>

        <!-- Charts Section -->
        <div class="charts-row">
            <div class="chart-card">
                <h2>주간 학습 추이</h2>
                <div class="chart-wrapper">
                    <canvas id="weeklyChart"></canvas>
                </div>
            </div>
            
            <div class="chart-card">
                <h2>학습 유형 분포</h2>
                <div class="chart-wrapper">
                    <canvas id="typeChart"></canvas>
                </div>
            </div>
        </div>

        <!-- Recent Activities -->
        <div class="activities-section">
            <h2>최근 학습 활동</h2>
            <div id="activities-container" class="activities-list">
                <!-- Activities injected by app.js -->
            </div>
        </div>

        <div class="footer-actions">
            <button id="reset-data-btn" class="btn-danger">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
                데이터 초기화
            </button>
        </div>
    </div>

    <script src="../shared/learning-tracker.js"></script>
    <script src="app.js"></script>
</body>
</html>
